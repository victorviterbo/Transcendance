global:
  get:
    summary: Get a user stats
    description: Retrieve a full profile statistics by exact username lookup.
    operationId: getProfileStats
    tags: [stats]
    parameters:
      - in: query
        name: q
        required: true
        schema: { type: string }
        description: Exact username to look up.
    responses:
      "200":
        description: Profile found
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/Profile
            examples:
              profile-ok:
                value:
                  average_score: 48
                  xp: 654
                  ranking: 3
                  total_players: 1687
                  average_time: 3.2
                  success_rate_artist: 23.6
                  success_rate_song: 39.7
                  success_rate_complete: 45.7
                  success_rates_complete_by_tag:
                    { "TAG_POP": 12.5, "TAG_ROCK": 65.3 }
      "400":
        description: Invalid or missing query.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/ValidationError
            examples:
              missing-query:
                value:
                  error:
                    query: "MISSING_FIELD"
              not-found:
                value:
                  error:
                    query: "USER_NOT_FOUND"
leaderboard:
  get:
    summary: Leaderboard
    description: Return 10 best players and their info.
    operationId: leaderboard
    tags: [stats]
    responses:
      "200":
        description: List of 10 best players
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: ../openapi.yaml#/components/schemas/LightProfile
            examples:
              match:
                value:
                  "leaderboard":
                    "username": "jeanmichelblindtest"
                    "avatar": "url"
                    "xp": 135
                    "badges": "BADGE_DAZED_JELLYFISH"
                    "ranking": 1
                    "is_current_user": False
                  "leaderboard_count": 1
                  "total_number_player": 1

history:
  get:
    summary: Match history
    description: Return the 10 last games played
    operationId: history
    tags: [stats]
    responses:
      "200":
        description: Last 10 matches and their content
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: ../openapi.yaml#/components/schemas/LightProfile
            examples:
              match:
                value:
                  "leaderboard":
                    "played_at": "MM-DD-YYYY"
                    "xp_earned": 34
                    "ranking": 3
                    "room_title": "Kristopher's Room"
                    "tags": ["TAG_POP", "TAG_ROCK"]
                    "players":
                    [
                      {
                        "username": "jeanmichelblindtest",
                        "avatar": "default_pic",
                        "ranking": 5
                      }
                    ]
                    "rounds":
                      [
                        {
                          "track_name": "The Chain",
                          "track_artist": "Fleetwood Mac",
                          "song_found": False,
                          "artist_found": True,
                          "time": 0,
                          "ranking": 12,
                          "preview_url": "https://mescouillessurtonfront",
                          "artwork_url": "https://mescouillessurlacommode",
                          "round_number": 1,
                        },
                        {},
                      ]
                  "history_count": 1
