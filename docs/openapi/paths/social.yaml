friends-list:
  get:
    summary: List friends
    description: Return the accepted friends of the authenticated user.
    operationId: listFriends
    tags: [social]
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Friend list.
        content:
          application/json:
            schema:
              type: object
              properties:
                friends:
                  type: array
                  items:
                    $ref: ../openapi.yaml#/components/schemas/LightProfile
            examples:
              friends-ok:
                value:
                  friends:
                    - username: "alice"
                      avatar: "/DB/media/default_avatars/default_avatar_2.png"
                      is_guest: false
                      session_key: null
      "401":
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/AuthError

request-pend:
  get:
    summary: List pending friend requests
    description: Return incoming and outgoing pending friendships for the authenticated user.
    operationId: listPendingFriendRequests
    tags: [social]
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Pending friend requests.
        content:
          application/json:
            schema:
              type: object
              properties:
                incomming:
                  type: array
                  items:
                    $ref: ../openapi.yaml#/components/schemas/Friendship
                outgoing:
                  type: array
                  items:
                    $ref: ../openapi.yaml#/components/schemas/Friendship
            examples:
              pending-ok:
                value:
                  incomming:
                    - from_user:
                        email: "alice@example.com"
                        username: "alice"
                        avatar: "/DB/media/default_avatars/default_avatar_2.png"
                        exp_points: 0
                        badges: "Deaf Octopus"
                        created_at: "2025-06-01T12:00:00Z"
                        is_guest: false
                        uid: "ec2fc730-d530-4db6-af4e-2ad0b0854f1c"
                      to_user:
                        email: "marc@example.com"
                        username: "marc"
                        avatar: "/DB/media/default_avatars/default_avatar_1.png"
                        exp_points: 0
                        badges: "Deaf Octopus"
                        created_at: "2025-06-01T12:00:00Z"
                        is_guest: false
                        uid: "53a94d8d-3b4f-4dc8-a2e6-80b71f5b454f"
                      status: "pending"
                      created_at: "2025-06-02T12:00:00Z"
                      uid: "fd19c0f6-c403-426a-8efe-cbfc8157afb7"
                  outgoing: []
      "401":
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/AuthError

request-send:
  post:
    summary: Send a friend request
    description: Send a pending friendship request to the user identified by `user_uid`.
    operationId: sendFriendRequest
    tags: [social]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [user_uid]
            properties:
              user_uid: { type: string, format: uuid }
          examples:
            send-request:
              value:
                user_uid: "ec2fc730-d530-4db6-af4e-2ad0b0854f1c"
    responses:
      "201":
        description: Friend request sent successfully.
        content:
          application/json:
            schema:
              type: object
              properties:
                description: { type: string }
                user-uid: { type: string, format: uuid }
            examples:
              request-sent:
                value:
                  description: "FRIENDSHIP_REQUEST_SENT"
                  user-uid: "ec2fc730-d530-4db6-af4e-2ad0b0854f1c"
      "400":
        description: Request could not be sent.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/ValidationError
            examples:
              missing-user-uid:
                value:
                  error:
                    user_uid: "MISSING_FIELD"
              user-not-found:
                value:
                  error:
                    user_uid: "USER_NOT_FOUND"
              already-exists:
                value:
                  error:
                    friendship: "FRIENDSHIP_ALREADY_EXISTS"
                  request_status: "pending"
              self-request:
                value:
                  error:
                    friendship: "REALLY_SAD"
      "401":
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/AuthError

request-respond:
  post:
    summary: Respond to a friend request
    description: Accept or reject a pending incoming friend request.
    operationId: respondToFriendRequest
    tags: [social]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [user_uid, new-status]
            properties:
              user_uid: { type: string, format: uuid }
              new-status:
                type: string
                enum: [accept, reject]
          examples:
            accept-request:
              value:
                user_uid: "ec2fc730-d530-4db6-af4e-2ad0b0854f1c"
                new-status: "accept"
    responses:
      "200":
        description: Friend request accepted or rejected.
        content:
          application/json:
            schema:
              type: object
              properties:
                description: { type: string }
                user_uid: { type: string, format: uuid }
            examples:
              accepted:
                value:
                  description: "FRIENDSHIP_REQUEST_ACCEPTED"
                  user_uid: "ec2fc730-d530-4db6-af4e-2ad0b0854f1c"
              rejected:
                value:
                  description: "FRIENDSHIP_REQUEST_REJECTED"
                  user_uid: "ec2fc730-d530-4db6-af4e-2ad0b0854f1c"
      "400":
        description: Response could not be processed.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/ValidationError
            examples:
              missing-user-uid:
                value:
                  error:
                    user_uid: "MISSING_FIELD"
              user-not-found:
                value:
                  error:
                    user_uid: "USER_NOT_FOUND"
              friendship-not-found:
                value:
                  error:
                    friendship: "FRIENDSHIP_NOT_FOUND"
      "401":
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/AuthError
