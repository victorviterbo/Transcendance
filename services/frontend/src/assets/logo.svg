<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="30 30 100 100" fill="none">
  <defs>
    <linearGradient id="logo-ring" x1="34" y1="34" x2="118" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#42EDFF" />
      <stop offset="0.52" stop-color="#536BFF" />
      <stop offset="1" stop-color="#FF58BC" />
    </linearGradient>

    <linearGradient id="note-fill" x1="66" y1="54" x2="110" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFDF7" />
      <stop offset="1" stop-color="#FFE9F6" />
    </linearGradient>
  </defs>

  <g filter="url(#logo-shadow)">
    <!-- Vinyl -->
    <circle cx="80" cy="80" r="44" fill="url(#logo-ring)" stroke="#170F38" stroke-width="8" />
    <circle cx="80" cy="80" r="24" fill="#170F38" />
    <circle cx="80" cy="80" r="34" stroke="#FFF9EF" stroke-opacity="0.18" stroke-width="4" />
    <path d="M52 64C56 53 66 46 78 44" stroke="#FFFFFF" stroke-opacity="0.72" stroke-width="6" stroke-linecap="round" />

    <!-- Music note -->
    <g transform="rotate(-8 90 78)">
      <ellipse cx="76" cy="100" rx="16" ry="11.5" fill="url(#note-fill)" stroke="#170F38" stroke-width="4"/>
      <path d="M94 56
               C101 49.5 111 47.5 118 50.5
               L118 65
               C110 61.5 101 62.5 94 68 Z"
            fill="url(#note-fill)" stroke="#170F38" stroke-width="4" stroke-linejoin="round"/>
      <rect x="89" y="52" width="11" height="44" rx="5.5" fill="url(#note-fill)" stroke="#170F38" stroke-width="4"/>
    </g>

<g transform="translate(19,8) scale(0.95)">
    <path d="M36 52L39 60L48 63L39 66L36 74L33 66L24 63L33 60L36 52Z"
          fill="#FFD84A" stroke="#170F38" stroke-width="4" stroke-linejoin="round" />
</g>
  </g>
</svg>
