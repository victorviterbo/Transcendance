profile:
  get:
    summary: Get a user profile
    description: Retrieve a full profile by exact username lookup.
    operationId: getProfile
    tags: [profile]
    parameters:
      - in: query
        name: q
        required: true
        schema: { type: string }
        description: Exact username to look up.
    responses:
      "200":
        description: Profile found
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/Profile
            examples:
              profile-ok:
                value:
                  username: "marc"
                  email: "marc@example.com"
                  avatar: "http://localhost:8000/media/profile_pics/user_1_profile.png"
                  exp_points: 420
                  badges: "Curious Cat"
                  created_at: "2025-06-01T12:00:00Z"
      "400":
        description: Invalid or missing query.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/ValidationError
            examples:
              missing-query:
                value:
                  error:
                    query: "MISSING_FIELD"
              empty-query:
                value:
                  error:
                    query: "EMPTY_FIELD"
              not-found:
                value:
                  error:
                    query: "NOT_FOUND"

  post:
    summary: Update own profile
    description: Update the authenticated user's profile (partial update).
    operationId: updateProfile
    tags: [profile]
    security:
      - bearerAuth: []
    requestBody:
      description: Fields to update. Avatar upload requires multipart/form-data.
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              username: { type: string }
              avatar: { type: string, format: binary }
    responses:
      "200":
        description: Profile updated. Returns the updated profile data.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/Profile
            examples:
              update-ok:
                value:
                  username: "marc"
                  avatar: "http://localhost:8000/media/profile_pics/user_1_profile.png"
                  exp_points: 420
                  badges: "Curious Cat"
                  created_at: "2025-06-01T12:00:00Z"
      "400":
        description: Field validation error.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/ValidationError
            examples:
              invalid-field:
                value:
                  error:
                    username: "INVALID"
      "409":
        description: Username already taken.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/ConflictError
            examples:
              username-taken:
                value:
                  error:
                    username: "ALREADY_TAKEN"
      "401":
        description: Not authenticated.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/AuthError

  delete:
    summary: Delete own profile
    description: Permanently delete the authenticated user's account and profile after password confirmation.
    operationId: deleteProfile
    tags: [profile]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../openapi.yaml#/components/schemas/ProfileDeleteRequest
          examples:
            confirm-delete:
              value:
                password: "Password123+"
    responses:
      "204":
        description: Profile deleted successfully.
      "400":
        description: Validation error.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/ValidationError
            examples:
              missing-password:
                value:
                  error:
                    password: "MISSING_FIELD"
              invalid-password:
                value:
                  error:
                    password: "INVALID_PASSWORD"
      "401":
        description: Not authenticated.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/AuthError

password:
  post:
    summary: Change password
    description: |
      Update the authenticated user's password using the current password and a new password.
      The new password must be different from the current password.
    operationId: changeProfilePassword
    tags: [profile]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../openapi.yaml#/components/schemas/ProfilePasswordChangeRequest
          examples:
            change-password:
              value:
                currentPassword: "Password123+"
                newPassword: "NewPassword123+"
    responses:
      "200":
        description: Password changed successfully.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/DescriptionResponse
            examples:
              password-updated:
                value:
                  description: "Updated password successfully"
      "400":
        description: Validation error.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/ValidationError
            examples:
              missing-fields:
                value:
                  error:
                    currentPassword: "MISSING_FIELD"
                    newPassword: "MISSING_FIELD"
              invalid-current-password:
                value:
                  error:
                    currentPassword: "INVALID_PASSWORD"
              unchanged-password:
                value:
                  error:
                    newPassword: "PASSWORD_UNCHANGED"
      "401":
        description: Not authenticated.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/AuthError

search:
  get:
    summary: Search profiles
    description: Search for profiles matching the given username.
    operationId: searchProfiles
    tags: [profile]
    parameters:
      - in: query
        name: q
        required: true
        schema: { type: string }
        description: Username to search for.
    responses:
      "200":
        description: List of matching profiles
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: ../openapi.yaml#/components/schemas/LightProfile
      "400":
        description: Query parameter missing or empty.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/ValidationError
            examples:
              missing-query:
                value:
                  error:
                    query: "MISSING_FIELD"
              empty-query:
                value:
                  error:
                    query: "EMPTY_FIELD"

guest-create:
  post:
    summary: Create or update a guest profile
    description: |
      Create a guest profile tied to the current session.
      If a guest profile already exists for the session, it is updated instead.
    operationId: createGuestProfile
    tags: [profile]
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              username: { type: string }
              avatar: { type: string, format: binary }
            required: [username]
    responses:
      "201":
        description: Guest profile created
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/LightProfile
      "200":
        description: Existing guest profile updated
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/LightProfile
      "400":
        description: Validation error
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/ValidationError

guest-delete:
  post:
    summary: Delete guest profile
    description: Remove the guest profile associated with the current session.
    operationId: deleteGuestProfile
    tags: [profile]
    responses:
      "204":
        description: Guest profile deleted (or no guest profile existed)
