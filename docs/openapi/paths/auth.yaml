register:
  post:
    summary: Register a new user
    description: Create a user account with a username, email, and password.
    operationId: registerUser
    tags: [auth]
    requestBody:
      description: Registration payload.
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [username, email, password]
            properties:
              username: { type: string }
              email: { type: string }
              password: { type: string, format: password }
    responses:
      "201":
        description: User created. Sets a refresh-token cookie.
        headers:
          Set-Cookie:
            description: "refresh-token (httponly, secure, samesite=Lax, path=/api/auth/)"
            schema: { type: string }
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/TokenResponse
            examples:
              register-ok:
                value:
                  username: "marc"
                  access: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      "400":
        description: Validation error (field invalid or missing).
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/ValidationError
            examples:
              invalid-email:
                value:
                  error:
                    email: "INVALID"
              invalid-username:
                value:
                  error:
                    username: "INVALID"
              weak-password:
                value:
                  error:
                    password: "PASSWORD_MIN"
              password-complexity:
                description: "Other codes: PASSWORD_NUMBER, PASSWORD_LOWERCASE, PASSWORD_UPPERCASE, PASSWORD_SPECIAL"
                value:
                  error:
                    password: "PASSWORD_NUMBER"
      "409":
        description: Username or email already taken.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/ConflictError
            examples:
              username-taken:
                value:
                  error:
                    username: "ALREADY_TAKEN"
              email-taken:
                value:
                  error:
                    email: "ALREADY_TAKEN"
              both-taken:
                value:
                  error:
                    username: "ALREADY_TAKEN"
                    email: "ALREADY_TAKEN"

login:
  post:
    summary: Login
    description: Authenticate a user with email and password credentials.
    operationId: loginUser
    tags: [auth]
    requestBody:
      description: Login credentials.
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [email, password]
            properties:
              email: { type: string }
              password: { type: string, format: password }
    responses:
      "200":
        description: Login successful. Sets a refresh-token cookie.
        headers:
          Set-Cookie:
            description: "refresh-token (httponly, secure, samesite=Lax, path=/api/auth/)"
            schema: { type: string }
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/TokenResponse
            examples:
              login-ok:
                value:
                  username: "marc"
                  access: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      "401":
        description: Invalid credentials.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/AuthError
            examples:
              auth-fail:
                value:
                  error:
                    auth: "INVALID_CREDENTIALS"

logout:
  post:
    summary: Logout
    description: |
      Blacklist the refresh token and delete the cookie.
      Also returns 204 when no cookie is present (idempotent).
    operationId: logoutUser
    tags: [auth]
    responses:
      "204":
        description: Logged out (or no session was active).
      "401":
        description: Refresh token present but invalid or already blacklisted.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/AuthError
            examples:
              auth-fail:
                value:
                  error:
                    auth: "INVALID_CREDENTIALS"

refresh:
  post:
    summary: Refresh access token
    description: Issue a new access and refresh token pair using the refresh-token cookie.
    operationId: refreshToken
    tags: [auth]
    responses:
      "200":
        description: New tokens issued. Sets a new refresh-token cookie.
        headers:
          Set-Cookie:
            description: "refresh-token (httponly, secure, samesite=Lax, path=/api/auth/)"
            schema: { type: string }
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/TokenResponse
            examples:
              refresh-ok:
                value:
                  username: "marc"
                  access: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      "401":
        description: Refresh token missing or invalid.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/AuthError
            examples:
              missing-cookie:
                value:
                  error:
                    cookie: "MISSING_FIELD"
              invalid-cookie:
                value:
                  error:
                    cookie: "INVALID"

friends:
  get:
    summary: List friends
    description: Returns the profiles of all accepted friends for the authenticated user.
    operationId: listFriends
    tags: [auth]
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Friend list.
        content:
          application/json:
            schema:
              type: object
              properties:
                friends:
                  type: array
                  items:
                    $ref: ../openapi.yaml#/components/schemas/Profile
            examples:
              friends-ok:
                value:
                  friends:
                    - username: "alice"
                      avatar: "http://localhost:8000/media/profile_pics/user_2_profile.png"
                      exp_points: 150
                      badges: "Curious Cat"
                      created_at: "2025-06-01T12:00:00Z"

friend-request:
  get:
    summary: List pending friend requests
    description: Returns incoming and outgoing pending friend requests for the authenticated user.
    operationId: listFriendRequests
    tags: [auth]
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Pending friend requests.
        content:
          application/json:
            schema:
              type: object
              properties:
                incomming:
                  type: array
                  items:
                    $ref: ../openapi.yaml#/components/schemas/Friendship
                outgoing:
                  type: array
                  items:
                    $ref: ../openapi.yaml#/components/schemas/Friendship
            examples:
              requests-ok:
                value:
                  incomming:
                    - from_user: "alice"
                      to_user: "marc"
                      status: "pending"
                      created_at: "2025-06-01T12:00:00Z"
                  outgoing: []

friend-request-send:
  post:
    summary: Send a friend request
    description: Send a friend request to the specified user.
    operationId: sendFriendRequest
    tags: [auth]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [target-username]
            properties:
              target-username: { type: string }
    responses:
      "201":
        description: Friend request sent successfully.
        content:
          application/json:
            schema:
              type: object
              properties:
                description: { type: string }
                target-username: { type: string }
            examples:
              request-sent:
                value:
                  description: "FRIENDSHIP_REQUEST_SENT"
                  target-username: "alice"
      "400":
        description: Request could not be sent.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/ValidationError
            examples:
              missing-target:
                value:
                  error:
                    target-username: "MISSING_FIELD"
              target-not-found:
                value:
                  error:
                    target-username: "NOT_FOUND"
                  requested: "alice"
              already-exists:
                value:
                  error:
                    friendship: "ALREADY_EXISTS"
                  request_status: "pending"
              self-request:
                value:
                  error:
                    friendship: "REALLY_SAD"

friend-request-respond:
  post:
    summary: Respond to a friend request
    description: Accept or reject an incoming friend request.
    operationId: respondFriendRequest
    tags: [auth]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [target-username, new-status]
            properties:
              target-username: { type: string }
              new-status:
                type: string
                enum: [accept, reject]
    responses:
      "200":
        description: Friend request accepted or rejected.
        content:
          application/json:
            schema:
              type: object
              properties:
                description: { type: string }
                target-username: { type: string }
            examples:
              accepted:
                value:
                  description: "REQUEST_ACCEPTED"
                  target-username: "alice"
              rejected:
                value:
                  description: "REQUEST_REJECTED"
                  target-username: "alice"
      "400":
        description: Response could not be processed.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/ValidationError
            examples:
              missing-target:
                value:
                  error:
                    target-username: "MISSING_FIELD"
              target-not-found:
                value:
                  error:
                    target-username: "NOT_FOUND"
                  requested: "alice"
              friendship-not-found:
                value:
                  error:
                    friendship: "NOT_FOUND"
