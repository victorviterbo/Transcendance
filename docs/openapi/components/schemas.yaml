Profile:
  type: object
  description: Full user profile data.
  properties:
    username: { type: string }
    avatar: { type: string, format: uri }
    exp_points: { type: integer }
    badges: { type: string }
    created_at: { type: string, format: date-time }
    email:
      type: string
      description: Only present for profiles linked to a registered user.

LightProfile:
  type: object
  description: Minimal profile data (guests and search results).
  properties:
    username: { type: string }
    avatar: { type: string, format: uri }
    is_guest: { type: boolean }
    session_key: { type: string }

Friendship:
  type: object
  description: A friendship or pending friend request between two users.
  properties:
    from_user: { type: string, description: Username of the request sender. }
    to_user: { type: string, description: Username of the request recipient. }
    status: { type: string, enum: [pending, accepted] }
    created_at: { type: string, format: date-time }

ValidationError:
  type: object
  description: Structured validation error details (values are localization keys).
  properties:
    error:
      type: object
      additionalProperties: { type: string }
  required: [error]

AuthError:
  type: object
  description: Authentication or authorization error details (values are localization keys).
  properties:
    error:
      type: object
      additionalProperties: { type: string }
  required: [error]

ConflictError:
  type: object
  description: Conflict due to a unique field already being used (values are localization keys).
  properties:
    error:
      type: object
      additionalProperties: { type: string }
  required: [error]

TokenResponse:
  type: object
  description: Short-lived access token response.
  properties:
    access: { type: string }
    username: { type: string }
  required: [access, username]

DescriptionResponse:
  type: object
  description: Generic success response with a localized or human-readable message.
  properties:
    description: { type: string }
  required: [description]

ProfileDeleteRequest:
  type: object
  description: Password confirmation payload required to permanently delete the current profile.
  properties:
    password: { type: string, format: password }
  required: [password]

ProfilePasswordChangeRequest:
  type: object
  description: Payload used to change the authenticated user's password.
  properties:
    currentPassword:
      { type: string, format: password, description: Current (old) password. }
    newPassword:
      { type: string, format: password, description: Replacement password. }
  required: [currentPassword, newPassword]
