register:
  post:
    summary: Register a new user
    description: Create a user account with a username, email, and password.
    operationId: registerUser
    tags: [auth]
    requestBody:
      description: Registration payload.
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [username, email, password]
            properties:
              username: { type: string }
              email: { type: string }
              password: { type: string, format: password }
    responses:
      "201":
        description: User created. Sets a refresh-token cookie.
        headers:
          Set-Cookie:
            description: "refresh-token (httponly, secure, samesite=Lax, path=/api/auth/)"
            schema: { type: string }
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/TokenResponse
            examples:
              register-ok:
                value:
                  username: "marc"
                  access: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      "400":
        description: Validation error (field invalid or missing).
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/ValidationError
            examples:
              invalid-email:
                value:
                  error:
                    email: "INVALID_EMAIL"
              invalid-username:
                value:
                  error:
                    username: "INVALID_USERNAME"
              invalid-password:
                value:
                  error:
                    password: "INVALID_PASSWORD"
      "409":
        description: Username or email already taken.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/ConflictError
            examples:
              username-taken:
                value:
                  error:
                    username: "USERNAME_TAKEN"
              email-taken:
                value:
                  error:
                    email: "EMAIL_TAKEN"
              both-taken:
                value:
                  error:
                    username: "USERNAME_TAKEN"
                    email: "EMAIL_TAKEN"

login:
  post:
    summary: Login
    description: Authenticate a user with email and password credentials.
    operationId: loginUser
    tags: [auth]
    requestBody:
      description: Login credentials.
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [email, password]
            properties:
              email: { type: string }
              password: { type: string, format: password }
    responses:
      "200":
        description: Login successful. Sets a refresh-token cookie.
        headers:
          Set-Cookie:
            description: "refresh-token (httponly, secure, samesite=Lax, path=/api/auth/)"
            schema: { type: string }
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/TokenResponse
            examples:
              login-ok:
                value:
                  username: "marc"
                  access: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      "401":
        description: Invalid credentials.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/AuthError
            examples:
              auth-fail:
                value:
                  error:
                    auth: "INVALID_CREDENTIALS"

logout:
  post:
    summary: Logout
    description: |
      Blacklist the refresh token and delete the cookie.
      Also returns 204 when no cookie is present (idempotent).
    operationId: logoutUser
    tags: [auth]
    responses:
      "204":
        description: Logged out (or no session was active).
      "401":
        description: Refresh token present but invalid or already blacklisted.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/AuthError
            examples:
              auth-fail:
                value:
                  error:
                    auth: "INVALID_CREDENTIALS"

refresh:
  post:
    summary: Refresh access token
    description: |
      Issue a new access token using the `refresh-token` cookie.
      If refresh rotation is enabled, the response also replaces the cookie.
    operationId: refreshToken
    tags: [auth]
    responses:
      "200":
        description: New access token issued. May also set a rotated refresh-token cookie.
        headers:
          Set-Cookie:
            description: "refresh-token (httponly, secure, samesite=Lax, path=/api/auth/) when rotation returns a new refresh token"
            schema: { type: string }
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/TokenResponse
            examples:
              refresh-ok:
                value:
                  username: "marc"
                  access: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      "401":
        description: Refresh token missing or invalid.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/AuthError
            examples:
              missing-cookie:
                value:
                  error:
                    cookie: "MISSING_FIELD"
              token-not-valid:
                value:
                  error:
                    cookie: "TOKEN_NOT_VALID"
              invalid-cookie:
                value:
                  error:
                    cookie: "INVALID"

password:
  post:
    summary: Change password
    description: |
      Update the authenticated user's password using the current password and a new password.
      On success, the backend issues a fresh access token and rotates the refresh cookie.
    operationId: changePassword
    tags: [auth]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../openapi.yaml#/components/schemas/ProfilePasswordChangeRequest
          examples:
            change-password:
              value:
                currentPassword: "Password123+"
                newPassword: "NewPassword123+"
    responses:
      "200":
        description: Password changed successfully. Sets a new refresh-token cookie.
        headers:
          Set-Cookie:
            description: "refresh-token (httponly, secure, samesite=Lax, path=/api/auth/)"
            schema: { type: string }
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/PasswordChangeResponse
            examples:
              password-updated:
                value:
                  description: "PASSWORD_UPDATED"
                  username: "marc"
                  access: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      "400":
        description: Validation error.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/ValidationError
            examples:
              missing-both:
                value:
                  error:
                    currentPassword: "MISSING_FIELD"
                    newPassword: "MISSING_FIELD"
              missing-current-password:
                value:
                  error:
                    currentPassword: "MISSING_FIELD"
              missing-new-password:
                value:
                  error:
                    newPassword: "MISSING_FIELD"
              invalid-current-password:
                value:
                  error:
                    currentPassword: "INVALID_PASSWORD"
              invalid-new-password:
                value:
                  error:
                    password: "INVALID_PASSWORD"
      "401":
        description: Not authenticated.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/AuthError

delete:
  post:
    summary: Delete account
    description: Permanently delete the authenticated user after password confirmation.
    operationId: deleteAccount
    tags: [auth]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../openapi.yaml#/components/schemas/ProfileDeleteRequest
          examples:
            confirm-delete:
              value:
                password: "Password123+"
    responses:
      "204":
        description: Account deleted successfully.
      "400":
        description: Validation error.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/ValidationError
            examples:
              missing-password:
                value:
                  error:
                    password: "MISSING_FIELD"
              invalid-password:
                value:
                  error:
                    password: "INVALID_PASSWORD"
              delete-failed:
                value:
                  error:
                    profile: "USER_DELETE_FAIL"
      "401":
        description: Not authenticated.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/AuthError
