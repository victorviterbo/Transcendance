openapi: 3.0.3
info:
  title: ft_transcendence API
  version: 0.1.0
  description: Internal API for the webapp.
  contact:
    name: ft_transcendence Team
    email: support@example.com
servers:
  - url: http://localhost:8000

paths:
  /api/auth/register:
    $ref: ./paths/auth.yaml#/register
  /api/auth/login:
    $ref: ./paths/auth.yaml#/login
  /api/auth/refresh:
    $ref: ./paths/auth.yaml#/refresh
  /api/auth/logout:
    $ref: ./paths/auth.yaml#/logout
  /api/auth/friends:
    $ref: ./paths/auth.yaml#/friends
  /api/auth/friend-request:
    $ref: ./paths/auth.yaml#/friend-request
  /api/auth/friend-request/send:
    $ref: ./paths/auth.yaml#/friend-request-send
  /api/auth/friend-request/respond:
    $ref: ./paths/auth.yaml#/friend-request-respond
  /api/profile:
    $ref: ./paths/profile.yaml#/profile
  /api/profile/password:
    $ref: ./paths/profile.yaml#/password
  /api/profile/search:
    $ref: ./paths/profile.yaml#/search
  /api/profile/guest-create:
    $ref: ./paths/profile.yaml#/guest-create
  /api/profile/guest-delete:
    $ref: ./paths/profile.yaml#/guest-delete

components:
  schemas:
    Profile:
      $ref: ./components/schemas.yaml#/Profile
    LightProfile:
      $ref: ./components/schemas.yaml#/LightProfile
    Friendship:
      $ref: ./components/schemas.yaml#/Friendship
    ValidationError:
      $ref: ./components/schemas.yaml#/ValidationError
    AuthError:
      $ref: ./components/schemas.yaml#/AuthError
    ConflictError:
      $ref: ./components/schemas.yaml#/ConflictError
    TokenResponse:
      $ref: ./components/schemas.yaml#/TokenResponse
    DescriptionResponse:
      $ref: ./components/schemas.yaml#/DescriptionResponse
    ProfileDeleteRequest:
      $ref: ./components/schemas.yaml#/ProfileDeleteRequest
    ProfilePasswordChangeRequest:
      $ref: ./components/schemas.yaml#/ProfilePasswordChangeRequest
    WS Reponse:
      $ref: ./components/schemas_ws.yaml#/WSReponse
    WS Requests:
      $ref: ./components/schemas_ws.yaml#/WSRequest
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

tags:
  - name: auth
    description: Authentication and registration endpoints.
  - name: profile
    description: User profile and account management endpoints.
