profile:
  get:
    summary: Get a user profile
    description: Retrieve a full profile by exact username lookup.
    operationId: getProfile
    tags: [profile]
    parameters:
      - in: query
        name: q
        required: true
        schema: { type: string }
        description: Exact username to look up.
    responses:
      "200":
        description: Profile found
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/Profile
            examples:
              profile-ok:
                value:
                  username: "marc"
                  email: "marc@example.com"
                  avatar: "/DB/media/profile_pics/user_1_profile.png"
                  exp_points: 420
                  badges: "Curious Cat"
                  created_at: "2025-06-01T12:00:00Z"
      "400":
        description: Invalid or missing query.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/ValidationError
            examples:
              missing-query:
                value:
                  error:
                    query: "MISSING_FIELD"
              not-found:
                value:
                  error:
                    query: "USER_NOT_FOUND"

  post:
    summary: Update own profile
    description: Update the authenticated user's profile (partial update).
    operationId: updateProfile
    tags: [profile]
    security:
      - bearerAuth: []
    requestBody:
      description: Fields to update. Avatar uploads use the `avatar` field.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              username: { type: string }
              email: { type: string }
        multipart/form-data:
          schema:
            type: object
            properties:
              username: { type: string }
              email: { type: string }
              avatar: { type: string, format: binary }
    responses:
      "200":
        description: Profile updated. Returns the updated profile data.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/OwnProfile
            examples:
              update-ok:
                value:
                  email: "marc@example.com"
                  username: "marc"
                  avatar: "/DB/media/profile_pics/user_1_profile.png"
                  exp_points: 420
                  badges: "Curious Cat"
                  created_at: "2025-06-01T12:00:00Z"
                  is_guest: false
                  uid: "53a94d8d-3b4f-4dc8-a2e6-80b71f5b454f"
      "400":
        description: Field validation error.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/ValidationError
            examples:
              invalid-username:
                value:
                  error:
                    username: "INVALID_USERNAME"
              invalid-email:
                value:
                  error:
                    email: "INVALID_EMAIL"
              invalid-avatar:
                value:
                  error:
                    avatar: "INVALID_IMAGE"
      "409":
        description: Username already taken.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/ConflictError
            examples:
              username-taken:
                value:
                  error:
                    username: "USERNAME_TAKEN"
      "401":
        description: Not authenticated.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/AuthError

search:
  get:
    summary: Search profiles
    description: Return profiles whose username exactly matches the given query string.
    operationId: searchProfiles
    tags: [profile]
    parameters:
      - in: query
        name: q
        required: true
        schema: { type: string }
        description: Username to search for.
    responses:
      "200":
        description: List of matching profiles
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: ../openapi.yaml#/components/schemas/LightProfile
            examples:
              match:
                value:
                  - username: "marc"
                    avatar: "/DB/media/default_avatars/default_avatar_1.png"
                    is_guest: false
                    session_key: null
              no-match:
                value: []
      "400":
        description: Query parameter missing or empty.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/ValidationError
            examples:
              missing-query:
                value:
                  error:
                    query: "MISSING_FIELD"
              empty-query:
                value:
                  error:
                    query: "EMPTY_FIELD"

guest-create:
  post:
    summary: Create or update a guest profile
    description: |
      Create a guest profile tied to the current session.
      If a guest profile already exists for the session, it is updated instead.
    operationId: createGuestProfile
    tags: [profile]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              username: { type: string }
        multipart/form-data:
          schema:
            type: object
            properties:
              username: { type: string }
              avatar: { type: string, format: binary }
            required: [username]
    responses:
      "201":
        description: Guest profile created
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/LightProfile
            examples:
              guest-created:
                value:
                  username: "guest42"
                  avatar: "/DB/media/default_avatars/default_avatar_1.png"
                  is_guest: true
                  session_key: "x4y6z8example"
      "200":
        description: Existing guest profile updated
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/LightProfile
            examples:
              guest-updated:
                value:
                  username: "guest42"
                  avatar: "/DB/media/profile_pics/user_3_profile.png"
                  is_guest: true
                  session_key: "x4y6z8example"
      "400":
        description: Raw serializer validation errors
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/SerializerErrorResponse
            examples:
              username-taken:
                value:
                  username:
                    - "Username already taken"

guest-delete:
  post:
    summary: Delete guest profile
    description: Remove the guest profile associated with the current session.
    operationId: deleteGuestProfile
    tags: [profile]
    responses:
      "204":
        description: Guest profile deleted (or no guest profile existed)
